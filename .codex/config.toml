[mcp_servers.reverse_lab_tools]
command = "uv"
args = ["run", "--project", "tools/skills/mcp/ReverseLabToolsMCP", "python", "tools/skills/mcp/ReverseLabToolsMCP/reverse_lab_tools_mcp.py"]
startup_timeout_sec = 30

[mcp_servers.hunter_tools]
command = "python"
args = ["C:/Users/Administrator/.agents/skills/hunter/mcp_server.py"]
startup_timeout_sec = 30

[mcp_servers.hunter_tools.env]
OPEN_TGTYLAB_ROOT = "D:/Open-tgtylab"
